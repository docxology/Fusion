name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.binary }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            binary: hai-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            binary: hai-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            binary: hai-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            binary: hai-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Build standalone binary
        run: pnpm --filter hai build:exe -- --target ${{ matrix.target }}

      - name: Generate checksum (Linux)
        if: runner.os == 'Linux'
        run: |
          cd packages/cli/dist
          sha256sum ${{ matrix.binary }} > ${{ matrix.binary }}.sha256

      - name: Generate checksum (macOS)
        if: runner.os == 'macOS'
        run: |
          cd packages/cli/dist
          shasum -a 256 ${{ matrix.binary }} > ${{ matrix.binary }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd packages/cli/dist
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.binary }}").Hash.ToLower()
          "$hash  ${{ matrix.binary }}" | Out-File -Encoding ascii "${{ matrix.binary }}.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: |
            packages/cli/dist/${{ matrix.binary }}
            packages/cli/dist/${{ matrix.binary }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
